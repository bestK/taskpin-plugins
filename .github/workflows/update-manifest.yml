name: Update manifest and README

on:
  push:
    branches: [master]
    paths:
      - '**.lua'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifest and README
        run: python3 .github/scripts/generate.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json README.md
          git diff --cached --quiet || git commit -m "chore: auto-update manifest and README"
          git push

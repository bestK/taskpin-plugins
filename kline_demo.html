<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BTC K-Line</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    </style>
</head>
<body>
    <div id="chart" style="width:100%;height:100%;"></div>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#1a1a2e' }, textColor: '#ddd' },
            grid: { vertLines: { color: '#2a2a3e' }, horzLines: { color: '#2a2a3e' } },
            crosshair: { mode: 0 },
            timeScale: { timeVisible: true, secondsVisible: false },
            width: window.innerWidth,
            height: window.innerHeight
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#26a69a', downColor: '#ef5350',
            borderUpColor: '#26a69a', borderDownColor: '#ef5350',
            wickUpColor: '#26a69a', wickDownColor: '#ef5350'
        });

        const volumeSeries = chart.addHistogramSeries({
            priceFormat: { type: 'volume' },
            priceScaleId: '',
            scaleMargins: { top: 0.85, bottom: 0 }
        });

        window.addEventListener('resize', () => {
            chart.applyOptions({ width: window.innerWidth, height: window.innerHeight });
        });

        const tzOffset = new Date().getTimezoneOffset() * 60;

        async function loadHistory() {
            try {
                let resp = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100');
                let data = await resp.json();
                if (!Array.isArray(data) || data.length === 0) return;
                let candles = [], volumes = [];
                for (let k of data) {
                    let t = Math.floor(k[0] / 1000) - tzOffset;
                    let o = +k[1], h = +k[2], l = +k[3], c = +k[4], v = +k[5];
                    candles.push({ time: t, open: o, high: h, low: l, close: c });
                    volumes.push({ time: t, value: v, color: c >= o ? '#26a69a55' : '#ef535055' });
                }
                candleSeries.setData(candles);
                volumeSeries.setData(volumes);
                chart.timeScale().scrollToRealTime();
                updateBar(candles[candles.length - 1]);
            } catch (e) {
                console.error('loadHistory:', e);
            }
        }

        function connectWS() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@kline_1m');
            ws.onmessage = (e) => {
                try {
                    const msg = JSON.parse(e.data);
                    const k = msg.k;
                    const candle = {
                        time: Math.floor(k.t / 1000) - tzOffset,
                        open: +k.o, high: +k.h, low: +k.l, close: +k.c
                    };
                    candleSeries.update(candle);
                    volumeSeries.update({
                        time: candle.time,
                        value: +k.v,
                        color: candle.close >= candle.open ? '#26a69a55' : '#ef535055'
                    });
                    updateBar(candle);
                } catch (e) {}
            };
            ws.onclose = () => setTimeout(connectWS, 3000);
        }

        function updateBar(candle) {
            let price = candle.close.toFixed(1);
            let change = ((candle.close - candle.open) / candle.open * 100).toFixed(2);
            let color = candle.close >= candle.open ? '#26a69a' : '#ef5350';
            let arrow = candle.close >= candle.open ? '↑' : '↓';
            let lua = "font('BTC " + price + "', '" + color + "', 9) .. font(' " + arrow + change + "%', '" + color + "', 8)";
            taskpin.sys.set_bar_lua(lua);
        }

        loadHistory();
        connectWS();
    </script>
</body>
</html>

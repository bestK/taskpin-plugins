<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
      @keyframes slideRight { from { transform: translateX(-10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      @keyframes barExpand { from { width: 200px; } to { width: 380px; } }
      @keyframes barShrink { from { width: 380px; } to { width: 200px; } }
      @keyframes btnHover { 0%,100% { fill: #000000; } 50% { fill: #272727; } }
      .bar { fill: #1e1e1e; rx: 4; ry: 4; }
      .text-white { fill: #ffffff; font-family: 'Segoe UI', sans-serif; font-size: 11px; }
      .text-gray { fill: #888888; font-family: 'Segoe UI', sans-serif; font-size: 10px; }
      .text-blue { fill: #4FC3F7; font-family: 'Segoe UI', sans-serif; font-size: 11px; }
      .text-orange { fill: #FF6600; font-family: 'Segoe UI', sans-serif; font-size: 11px; }
      .text-desc { fill: #888888; font-family: 'Segoe UI', sans-serif; font-size: 9px; }
      .btn { rx: 3; ry: 3; }
      .btn-allow { fill: #000000; stroke: #000000; stroke-width: 0.5; }
      .btn-deny { fill: #000000; stroke: #000000; stroke-width: 0.5; }
      .btn-text-allow { fill: #2E7D32; font-family: 'Segoe UI', sans-serif; font-size: 10px; font-weight: bold; }
      .btn-text-deny { fill: #C62828; font-family: 'Segoe UI', sans-serif; font-size: 10px; font-weight: bold; }
      .label { fill: #666; font-family: 'Segoe UI', sans-serif; font-size: 10px; }
      .phase-label { fill: #999; font-family: 'Segoe UI', sans-serif; font-size: 12px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="#0d1117" rx="8"/>

  <!-- Phase 1: Idle (0s-3s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.02;0.14;0.16" dur="20s" repeatCount="indefinite"/>
    <text x="300" y="20" class="phase-label" text-anchor="middle">idle</text>
    <rect x="110" y="35" width="200" height="40" class="bar"/>
    <!-- Claude icon placeholder -->
    <circle cx="130" cy="55" r="8" fill="#D97757"/>
    <text x="128" y="59" fill="white" font-size="10" font-family="sans-serif" text-anchor="middle">C</text>
    <text x="145" y="59" class="text-gray">休息中</text>
  </g>

  <!-- Phase 2: Working (3s-6s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.16;0.18;0.29;0.31" dur="20s" repeatCount="indefinite"/>
    <text x="300" y="20" class="phase-label" text-anchor="middle">working</text>
    <rect x="110" y="35" width="200" height="40" class="bar"/>
    <circle cx="130" cy="55" r="8" fill="#D97757"/>
    <text x="128" y="59" fill="white" font-size="10" font-family="sans-serif" text-anchor="middle">C</text>
    <!-- Spinner -->
    <g transform="translate(150, 55)">
      <circle r="5" fill="none" stroke="#4FC3F7" stroke-width="1.5" stroke-dasharray="20 10" opacity="0.8">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/>
      </circle>
    </g>
    <text x="162" y="59" class="text-blue">优化性能瓶颈</text>
  </g>

  <!-- Phase 3: Permission request appears (6s-14s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.31;0.33;0.69;0.71" dur="20s" repeatCount="indefinite"/>
    <text x="300" y="20" class="phase-label" text-anchor="middle">permission request</text>
    <!-- Expanded bar -->
    <rect x="110" y="30" width="380" height="45" class="bar">
      <animate attributeName="width" values="200;380" dur="0.3s" fill="freeze" begin="6.6s"/>
    </rect>
    <circle cx="130" cy="52" r="8" fill="#D97757"/>
    <text x="128" y="56" fill="white" font-size="10" font-family="sans-serif" text-anchor="middle">C</text>
    <!-- Line 1: command + buttons -->
    <text x="145" y="49" class="text-white" font-size="10">git push origin master</text>
    <!-- Allow button -->
    <rect x="310" y="38" width="40" height="22" class="btn btn-allow">
      <animate attributeName="fill" values="#000;#272727;#000" dur="3s" repeatCount="indefinite" begin="8s"/>
    </rect>
    <text x="330" y="53" class="btn-text-allow" text-anchor="middle">允许</text>
    <!-- Deny button -->
    <rect x="356" y="38" width="40" height="22" class="btn btn-deny"/>
    <text x="376" y="53" class="btn-text-deny" text-anchor="middle">拒绝</text>
    <!-- Line 2: description -->
    <text x="145" y="67" class="text-desc">Push local commits to remote</text>
  </g>

  <!-- Phase 4: Button clicked, back to working (14s-18s) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.71;0.73;0.89;0.91" dur="20s" repeatCount="indefinite"/>
    <text x="300" y="20" class="phase-label" text-anchor="middle">allowed → continue</text>
    <rect x="110" y="35" width="200" height="40" class="bar"/>
    <circle cx="130" cy="55" r="8" fill="#D97757"/>
    <text x="128" y="59" fill="white" font-size="10" font-family="sans-serif" text-anchor="middle">C</text>
    <g transform="translate(150, 55)">
      <circle r="5" fill="none" stroke="#4FC3F7" stroke-width="1.5" stroke-dasharray="20 10" opacity="0.8">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/>
      </circle>
    </g>
    <text x="162" y="59" class="text-blue">优化性能瓶颈</text>
  </g>

  <!-- Flow diagram at bottom -->
  <g transform="translate(0, 100)">
    <text x="30" y="30" class="label">Hook 触发</text>
    <line x1="85" y1="27" x2="110" y2="27" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="115" y="30" class="label">event → bar</text>
    <line x1="180" y1="27" x2="205" y2="27" stroke="#555" stroke-width="1"/>
    <text x="210" y="30" class="label">显示按钮</text>
    <line x1="275" y1="27" x2="300" y2="27" stroke="#555" stroke-width="1"/>
    <text x="305" y="30" class="label">用户点击</text>
    <line x1="370" y1="27" x2="395" y2="27" stroke="#555" stroke-width="1"/>
    <text x="400" y="30" class="label">response → hook</text>
    <line x1="495" y1="27" x2="520" y2="27" stroke="#555" stroke-width="1"/>
    <text x="525" y="30" class="label">继续</text>

    <!-- Arrows -->
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
      </marker>
    </defs>

    <text x="300" y="65" text-anchor="middle" fill="#444" font-family="monospace" font-size="9">
      taskpin.exe --source claude-code --event permission --wait
    </text>
    <text x="300" y="80" text-anchor="middle" fill="#444" font-family="monospace" font-size="9">
      → 显示按钮 → 点击 → 写 response file → stdout → Claude Code
    </text>
  </g>
</svg>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TaskPin - Installing Script</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #1a1a1a; color: #eee; }
.box { text-align: center; }
a { color: #58a6ff; }
</style>
</head>
<body>
<div class="box">
<h2>Installing script to TaskPin...</h2>
<p>If nothing happens, <a id="link" href="#">click here</a> or make sure TaskPin is installed.</p>
<p><a href="https://github.com/bestK/taskpin/releases">Download TaskPin</a></p>
</div>
<script>
var params = new URLSearchParams(window.location.search);
var url = params.get('url');
if (url) {
    var scheme = 'taskpin://install/' + url;
    document.getElementById('link').href = scheme;
    window.location.href = scheme;
}
</script>
</body>
</html>
